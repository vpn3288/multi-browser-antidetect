# Clash Verge 配置模板
# 将此内容追加到你的 Clash 配置文件中

# 额外监听端口（每个浏览器独立端口）
listeners:
  - name: browser-1
    type: mixed
    port: 7891
    proxy: 美国节点1  # 替换为实际节点名称
  
  - name: browser-2
    type: mixed
    port: 7892
    proxy: 美国节点2
  
  - name: browser-3
    type: mixed
    port: 7893
    proxy: 美国节点3
  
  - name: browser-4
    type: mixed
    port: 7894
    proxy: 美国节点4
  
  - name: browser-5
    type: mixed
    port: 7895
    proxy: 美国节点5
  
  - name: browser-6
    type: mixed
    port: 7896
    proxy: 美国节点6
  
  - name: browser-7
    type: mixed
    port: 7897
    proxy: 美国节点7

# 注意事项：
# 1. 将 "美国节点X" 替换为你 Clash 配置中的实际节点名称
# 2. 确保这些端口未被占用
# 3. 重启 Clash Verge 使配置生效
