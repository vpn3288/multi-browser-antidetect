# ═══════════════════════════════════════════════════════════
#  Clash 多端口配置 - 针对中国用户优化
# ═══════════════════════════════════════════════════════════

# 主端口（不使用）
mixed-port: 7890

# 为每个浏览器配置独立监听端口
listeners:
  - name: chrome-us-la
    type: mixed
    port: 7891
    proxy: 🇺🇸 美国-洛杉矶-01  # 替换为你的实际节点名称
    
  - name: firefox-jp-tokyo
    type: mixed
    port: 7892
    proxy: 🇯🇵 日本-东京-01  # 替换为你的实际节点名称
    
  - name: edge-sg
    type: mixed
    port: 7893
    proxy: 🇸🇬 新加坡-01  # 替换为你的实际节点名称
    
  - name: brave-uk-london
    type: mixed
    port: 7894
    proxy: 🇬🇧 英国-伦敦-01  # 替换为你的实际节点名称
    
  - name: opera-de-berlin
    type: mixed
    port: 7895
    proxy: 🇩🇪 德国-柏林-01  # 替换为你的实际节点名称
    
  - name: vivaldi-ca-toronto
    type: mixed
    port: 7896
    proxy: 🇨🇦 加拿大-多伦多-01  # 替换为你的实际节点名称
    
  - name: librewolf-au-sydney
    type: mixed
    port: 7897
    proxy: 🇦🇺 澳大利亚-悉尼-01  # 替换为你的实际节点名称

# DNS 配置（防止 DNS 泄露 - 关键！）
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - 'localhost.ptlogin2.qq.com'
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.quad9.net/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# 规则（针对中国用户优化）
rules:
  # 直连中国网站（如果需要访问国内网站）
  - GEOIP,CN,DIRECT
  # 其他流量走代理
  - MATCH,PROXY

# ═══════════════════════════════════════════════════════════
#  使用说明
# ═══════════════════════════════════════════════════════════
#
# 1. 将上面的内容复制到你的 Clash 配置文件中
# 2. 将 "🇺🇸 美国-洛杉矶-01" 等替换为你实际的节点名称
# 3. 确保这些端口（7891-7897）未被占用
# 4. 重启 Clash Verge 使配置生效
# 5. 测试每个端口：curl --proxy socks5://127.0.0.1:7891 https://ipinfo.io
#
# ═══════════════════════════════════════════════════════════
